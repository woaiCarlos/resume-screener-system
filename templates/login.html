<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智能简历筛选系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1E2140 0%, #2A2F5B 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-box h1 {
            text-align: center;
            color: #1E2140;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .login-box .subtitle {
            text-align: center;
            color: #6B7280;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.2s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #5B7FFF;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #5B7FFF;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login:hover {
            background: #4A6AE5;
        }
        .btn-login:disabled {
            background: #9CA3AF;
            cursor: not-allowed;
        }
        .error-msg {
            background: #FEE2E2;
            color: #991B1B;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .links {
            margin-top: 20px;
            text-align: center;
        }
        .links a {
            color: #5B7FFF;
            text-decoration: none;
            font-size: 14px;
        }
        .demo-hint {
            margin-top: 24px;
            padding: 16px;
            background: #F3F4F6;
            border-radius: 10px;
            font-size: 13px;
            color: #6B7280;
        }
        .demo-hint strong {
            color: #374151;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>智能简历筛选系统</h1>
        <p class="subtitle">管理后台登录</p>

        <div id="errorMsg" class="error-msg"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">登 录</button>
        </form>

        <div class="demo-hint">
            <strong>演示账号：</strong>用户名 <code>admin</code>，密码 <code>admin123</code><br>
            （首次使用请先运行 <code>python manage.py createsuperuser</code> 创建管理员）
        </div>
    </div>

    <script>
        function getCookie(name) {
            const v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
            return v ? v[2] : '';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('errorMsg');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            errEl.classList.remove('show');
            btn.disabled = true;
            btn.textContent = '登录中...';

            try {
                const resp = await fetch('/api/auth/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({ username, password })
                });
                const data = await resp.json();

                if (resp.ok && data.success) {
                    // 登录成功，跳转到主页
                    window.location.href = '/';
                } else {
                    errEl.textContent = data.error || '登录失败';
                    errEl.classList.add('show');
                    btn.disabled = false;
                    btn.textContent = '登 录';
                }
            } catch (err) {
                errEl.textContent = '网络错误，请重试';
                errEl.classList.add('show');
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        }

        // 检查是否已登录
        (async function() {
            try {
                const resp = await fetch('/api/auth/me/');
                const data = await resp.json();
                if (data.authenticated) {
                    window.location.href = '/';
                }
            } catch(e) {}
        })();
    </script>
</body>
</html>
